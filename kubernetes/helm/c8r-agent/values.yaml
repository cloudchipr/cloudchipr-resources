## @section General Configuration

## @param nameOverride Overrides the default name where the chart will be installed (Optional).
nameOverride: ""
## @param namespaceOverride Overrides the default namespace where the chart will be installed (Optional).
namespaceOverride: ""
## @param replicas Number of replicas for the deployment.
replicas: 1
## @param image.registry Registry to use for the image.
## @param image.repository Image repository to use for the image.
## @param image.tag Image tag to use for the image. Default is `.Chart.AppVersion`.
## @param image.pullPolicy Image pull policy to use for the image. Default is `Always`.
image:
  registry: quay.io
  repository: cloudchipr/c8r-agent
  tag: ""
  pullPolicy: Always
## @param serviceAccount.name service account name to create
## @param serviceAccount.labels service account labels
## @param serviceAccount.annotations service account annotations
serviceAccount:
  name: c8r-agent
  labels: {}
  annotations: {}
## @param config.c8r_api_key Token to authenticate with Cloudchipr API. Can be set in existing secret as C8R_API_KEY.
## @param config.c8r_cluster_id Cluster ID to identify the cluster in Cloudchipr. Can be set in existing secret as C8R_CLUSTER_ID.
## @param config.c8r_cluster_name Cluster name to identify the cluster in Cloudchipr. Can be set in existing secret as C8R_CLUSTER_NAME.
## @param config.c8r_cloud_account Cloud account identifier, e.g. AWS account id, GCP project id, Azure subscription name. Can be set in existing secret as C8R_CLOUD_ACCOUNT.
## @param config.existingSecret Existing secret to use for the API key, it must have all keys from `config`.
# -- parameters from config section and config.existingSecret will be merged, config parameters have precedence over existingSecret.
config:
  # -- generate from https://app.cloudchipr.com/settings/api-keys
  c8r_api_key: ""
  # -- should be valid UUID, can be generated with `uuidgen` command
  c8r_cluster_id: ""
  # -- name for the cluster, will be visible in Cloudchipr UI
  c8r_cluster_name: ""
  # -- cloud account identifier, e.g. AWS account id, GCP project id, Azure subscription name
  c8r_cloud_account: ""
  # -- all the keys must be in uppercase, like C8R_API_KEY, C8R_CLUSTER_ID, C8R_CLOUD_ACCOUNT, C8R_CLUSTER_NAME
  existingSecret: ""
## @param labels Extra labels for the deployment.
labels: {}
## @param annotations Annotations for the deployment.
annotations: {}
## @param podLabels Extra labels for the pod.
podLabels: {}
## @param podAnnotations Annotations for the pod.
podAnnotations: {}
## @param nodeSelector Node Selector labels for pod assignment.
nodeSelector: {}
## @param affinity Affinity settings for pod assignment.
affinity: {}
## @param tolerations Tolerations for pod assignment (Optional).
tolerations: []
## @param resources.requests.cpu CPU request for the container.
## @param resources.requests.memory Memory request for the container.
## @param resources.requests.ephemeral-storage Ephemeral storage request for the container.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
    ephemeral-storage: "128Mi"
    # limits:
    #   memory: 512Mi
    #   ephemeral-storage: "128Mi"
## @param securityContext.allowPrivilegeEscalation Allow privilege escalation for the container.
## @param securityContext.readOnlyRootFilesystem Read only root filesystem for the container.
## @param securityContext.runAsNonRoot Run as non root user for the container.
## @param securityContext.runAsUser Run as 10001 user for the container.
## @param securityContext.capabilities.drop Drop all capabilities for the container.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 10001
  capabilities:
    drop:
      - ALL
## @param podSecurityContext Security context for the pod.
podSecurityContext: {}
## @param addEnvFrom Add envFrom to the container.
addEnvFrom: []
# - secretRef:
#     name: my-secret
# - configMapRef:
#     name: my-configmap

## @param addEnv Add env to the container.
addEnv: []
# - name: KEY
#   value: VALUE

networkCollection:
  ## @param networkCollection.enabled enable network agent to collect networking data
  enabled: false
  server:
    ## @param networkCollection.server.enableMetrics enable metrics port and add prometheus scrape annotations to service
    enableMetrics: false
    ## @param networkCollection.server.resources.requests.cpu cpu request for network agent container
    ## @param networkCollection.server.resources.requests.memory memory request for network agent container
    ## @param networkCollection.server.resources.requests.ephemeral-storage node ephemeral storage request request for network agent container
    resources:
      requests:
        cpu: "100m"
        memory: "512Mi"
        ephemeral-storage: "64Mi"
      # limits:
      #   memory: "1Gi"
    ## @param networkCollection.server.addEnvFrom Add envFrom to the network agent container.
    addEnvFrom: []
    # - secretRef:
    #     name: my-secret
    # - configMapRef:
    #     name: my-configmap
    ## @param networkCollection.server.addEnv Add env to the network agent container.
    addEnv: []
    # - name: KEY
    #   value: VALUE
  collector:
    ## @param networkCollection.collector.collectionInterval interval for collecting network data
    collectionInterval: "5s"
    ## @param networkCollection.collector.skipConntrackSanityCheck skip conntrack sanity check
    skipConntrackSanityCheck: "false"
    ## @param networkCollection.collector.uptimeWaitDuration duration to wait for uptime before collecting
    uptimeWaitDuration: "300s"
    ## @param networkCollection.collector.nodeSelector Node Selector labels for collector pod assignment.
    nodeSelector: {}
    ## @skip networkCollection.collector.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0] Affinity settings for collector pod assignment.
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: eks.amazonaws.com/compute-type
                  operator: NotIn
                  values:
                    - fargate
    ## @skip networkCollection.collector.tolerations[0] Tolerations for collector pod assignment.
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    ## @param networkCollection.collector.resources.requests.cpu cpu request for network agent container
    ## @param networkCollection.collector.resources.requests.memory memory request for network agent container
    ## @param networkCollection.collector.resources.requests.ephemeral-storage node ephemeral storage request request for network agent container
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
        ephemeral-storage: "64Mi"
      # limits:
      #   cpu: "1"
      #   memory: "128Mi"
    ## @param networkCollection.collector.addEnvFrom Add envFrom to the network agent container.
    addEnvFrom: []
    # - secretRef:
    #     name: my-secret
    # - configMapRef:
    #     name: my-configmap
    ## @param networkCollection.collector.addEnv Add env to the network agent container.
    addEnv: []
    # - name: KEY
    #   value: VALUE

## @param autoscaling.hpa.enabled Enable HorizontalPodAutoscaler for the deployment. Requires `networkCollection.enabled=true`. When enabled, `replicas` is ignored.
## @param autoscaling.hpa.minReplicas Minimum number of replicas.
## @param autoscaling.hpa.maxReplicas Maximum number of replicas.
## @param autoscaling.hpa.targetCPUUtilizationPercentage Target average CPU utilization of the `c8r-network-agent` container (as a percentage of its request). Set to `null` to disable the CPU metric.
## @param autoscaling.hpa.targetMemoryUtilizationPercentage Target average memory utilization of the `c8r-network-agent` container (as a percentage of its request). Set to `null` to disable the memory metric.
## @param autoscaling.hpa.behavior HPA scaling behavior (scaleUp/scaleDown policies). Passed through as-is.
## @param autoscaling.hpa.annotations Annotations for the HorizontalPodAutoscaler.
## @param autoscaling.hpa.labels Extra labels for the HorizontalPodAutoscaler.
## @param autoscaling.vpa.deployment.enabled Enable VerticalPodAutoscaler for the deployment. Requires the VPA controller (autoscaling.k8s.io) to be installed in the cluster.
## @param autoscaling.vpa.deployment.updateMode VPA update mode for the deployment: `Off` (recommend only), `Initial`, `Recreate`, or `Auto`. When `autoscaling.hpa.enabled=true` this must be `Off` unless `autoscaling.vpa.deployment.networkAgent.mode` is `Off` (the per-container escape hatch).
## @param autoscaling.vpa.deployment.minReplicas Minimum replicas required before VPA will evict pods. Set to `null` to use the controller default.
## @param autoscaling.vpa.deployment.annotations Annotations for the deployment VerticalPodAutoscaler.
## @param autoscaling.vpa.deployment.labels Extra labels for the deployment VerticalPodAutoscaler.
## @param autoscaling.vpa.deployment.agent.mode Per-container update mode for the `c8r-agent` container: `Off` to opt this container out of automatic updates. Empty inherits `updateMode`.
## @param autoscaling.vpa.deployment.agent.minAllowed Minimum allowed resources for `c8r-agent` (e.g. `{cpu: 100m, memory: 128Mi}`).
## @param autoscaling.vpa.deployment.agent.maxAllowed Maximum allowed resources for `c8r-agent`.
## @param autoscaling.vpa.deployment.agent.controlledResources Resources VPA will manage on `c8r-agent`. Empty defers to the VPA controller default (`["cpu", "memory"]`).
## @param autoscaling.vpa.deployment.agent.controlledValues What VPA controls on `c8r-agent`: `RequestsAndLimits` or `RequestsOnly`. Empty defers to the controller default.
## @param autoscaling.vpa.deployment.networkAgent.mode Per-container update mode for the `c8r-network-agent` container. Set to `Off` when `autoscaling.hpa.enabled=true` so HPA can scale on this container's CPU/memory without VPA fighting it.
## @param autoscaling.vpa.deployment.networkAgent.minAllowed Minimum allowed resources for `c8r-network-agent`.
## @param autoscaling.vpa.deployment.networkAgent.maxAllowed Maximum allowed resources for `c8r-network-agent`.
## @param autoscaling.vpa.deployment.networkAgent.controlledResources Resources VPA will manage on `c8r-network-agent`.
## @param autoscaling.vpa.deployment.networkAgent.controlledValues What VPA controls on `c8r-network-agent`.
## @param autoscaling.vpa.collector.enabled Enable VerticalPodAutoscaler for the network collector DaemonSet. Requires `networkCollection.enabled=true`.
## @param autoscaling.vpa.collector.updateMode VPA update mode for the collector: `Off` (recommend only), `Initial`, `Recreate`, or `Auto`.
## @param autoscaling.vpa.collector.minReplicas Minimum replicas required before VPA will evict collector pods. Set to `null` to use the controller default.
## @param autoscaling.vpa.collector.annotations Annotations for the collector VerticalPodAutoscaler.
## @param autoscaling.vpa.collector.labels Extra labels for the collector VerticalPodAutoscaler.
## @param autoscaling.vpa.collector.mode Per-container update mode for the `collector` container.
## @param autoscaling.vpa.collector.minAllowed Minimum allowed resources for the `collector` container.
## @param autoscaling.vpa.collector.maxAllowed Maximum allowed resources for the `collector` container.
## @param autoscaling.vpa.collector.controlledResources Resources VPA will manage on the `collector` container.
## @param autoscaling.vpa.collector.controlledValues What VPA controls on the `collector` container.
autoscaling:
  hpa:
    # Requires networkCollection.enabled=true — the HPA scales on the
    # c8r-network-agent container, which only exists when network collection is on.
    enabled: false
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
    behavior: {}
    annotations: {}
    labels: {}
  vpa:
    deployment:
      # The Deployment Pod has two containers (c8r-agent and c8r-network-agent
      # when networkCollection is on). The `agent` and `networkAgent`
      # subsections each render as one entry in the VPA's
      # resourcePolicy.containerPolicies.
      #
      # When autoscaling.hpa.enabled=true, the HPA scales replicas on
      # c8r-network-agent CPU/memory. To avoid a request/replica feedback
      # loop, EITHER set updateMode to "Off" (recommend-only across both
      # containers) OR set networkAgent.mode to "Off" (lets VPA still
      # manage c8r-agent in Auto mode while keeping HPA's container
      # untouched).
      enabled: false
      updateMode: "Off"
      minReplicas: null
      annotations: {}
      labels: {}
      agent:
        # `Off` | `Initial` | `Recreate` | `Auto`. Empty inherits updateMode.
        mode: ""
        minAllowed: {}
        # cpu: 100m
        # memory: 128Mi
        maxAllowed: {}
        # cpu: "1"
        # memory: 1Gi
        controlledResources: []
        # - cpu
        # - memory
        controlledValues: ""  # RequestsAndLimits | RequestsOnly
      networkAgent:
        mode: ""
        minAllowed: {}
        maxAllowed: {}
        controlledResources: []
        controlledValues: ""
    collector:
      # Requires networkCollection.enabled=true — the collector DaemonSet only
      # exists when network collection is on. The DaemonSet has a single
      # container (`collector`); the `mode`/`minAllowed`/etc. fields below
      # render as a single entry in the VPA's resourcePolicy.containerPolicies.
      enabled: false
      updateMode: "Off"
      minReplicas: null
      annotations: {}
      labels: {}
      mode: ""
      minAllowed: {}
      # cpu: 50m
      # memory: 64Mi
      maxAllowed: {}
      # cpu: "1"
      # memory: 256Mi
      controlledResources: []
      controlledValues: ""
