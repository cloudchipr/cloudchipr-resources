{{ $createSecret := (include "..createSecret" .) }}
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-test"
  annotations:
    "helm.sh/hook": test
spec:
  template:
    spec:
      containers:
        - name: c8r-agent-test
          image: {{ printf "%s/%s:%s" .Values.image.registry .Values.image.repository ( default .Chart.AppVersion .Values.image.tag) }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: C8R_CHART_VERSION
              value: {{ .Chart.Version | quote }}
            - name: C8R_HELM_RELEASE_NAME
              value: {{ .Release.Name }}
            - name: C8R_INIT_CHECK
              value: "true"
            {{- with .Values.addEnv }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if or .Values.config.existingSecret (eq $createSecret "true") .Values.addEnvFrom }}
          envFrom:
            {{- if .Values.config.existingSecret }}
            - secretRef:
                name: {{ .Values.config.existingSecret }}
            {{- end }}
            {{- if eq $createSecret "true" }}
            - secretRef:
                name: {{ include "..fullname" . }}
            {{- end }}
            {{- with .Values.addEnvFrom }}
            {{- toYaml . | nindent 10 }}
            {{- end }}
          {{- end }}
      restartPolicy: Never
  backoffLimit: 0

