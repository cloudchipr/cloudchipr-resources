{{- if eq (include "..createSecret" . ) "true" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "..fullname" . }}
  namespace: {{ include "..namespace" . }}
  labels:
    {{- include "..labels" . | nindent 4 }}
    {{- with .Values.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
type: Opaque
data:
  {{- if .Values.config.c8r_api_key }}
  C8R_API_KEY: {{ printf "%v" .Values.config.c8r_api_key | b64enc }}
  {{- end }}
  {{- if .Values.config.c8r_cluster_id }}
  C8R_CLUSTER_ID: {{ printf "%v" .Values.config.c8r_cluster_id | b64enc }}
  {{- end }}
  {{- if .Values.config.c8r_cloud_account }}
  {{- if kindIs "float64" .Values.config.c8r_cloud_account }}
  C8R_CLOUD_ACCOUNT: {{ .Values.config.c8r_cloud_account | printf "%.0f" | b64enc }}
  {{- else }}
  C8R_CLOUD_ACCOUNT: {{ .Values.config.c8r_cloud_account | toString | b64enc }}
  {{- end }}
  {{- end }}
  {{- if .Values.config.c8r_cluster_name }}
  C8R_CLUSTER_NAME: {{ printf "%v" .Values.config.c8r_cluster_name | b64enc }}
  {{- end }}
{{- end -}}
