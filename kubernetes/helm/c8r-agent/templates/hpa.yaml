{{- $hpa := default dict (default dict .Values.autoscaling).hpa -}}
{{- if $hpa.enabled }}
{{- if not .Values.networkCollection.enabled -}}
{{- fail "autoscaling.hpa.enabled requires networkCollection.enabled=true: the HPA scales on the c8r-network-agent container, which only exists when network collection is enabled." -}}
{{- end }}
{{- if and (not $hpa.targetCPUUtilizationPercentage) (not $hpa.targetMemoryUtilizationPercentage) -}}
{{- fail "autoscaling.hpa requires at least one of targetCPUUtilizationPercentage or targetMemoryUtilizationPercentage to be set: an HPA with an empty metrics list is rejected by the Kubernetes API." -}}
{{- end }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "..fullname" . }}
  namespace: {{ include "..namespace" . }}
  labels:
    {{- include "..labels" . | nindent 4 }}
    {{- with .Values.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- with $hpa.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $hpa.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "..fullname" . }}
  minReplicas: {{ $hpa.minReplicas }}
  maxReplicas: {{ $hpa.maxReplicas }}
  metrics:
    {{- with $hpa.targetCPUUtilizationPercentage }}
    - type: ContainerResource
      containerResource:
        name: cpu
        container: c8r-network-agent
        target:
          type: Utilization
          averageUtilization: {{ . }}
    {{- end }}
    {{- with $hpa.targetMemoryUtilizationPercentage }}
    - type: ContainerResource
      containerResource:
        name: memory
        container: c8r-network-agent
        target:
          type: Utilization
          averageUtilization: {{ . }}
    {{- end }}
  {{- with $hpa.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
