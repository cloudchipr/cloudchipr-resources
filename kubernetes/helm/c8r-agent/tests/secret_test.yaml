suite: Secret
templates:
  - templates/secret.yaml
release:
  name: my-release
  namespace: cloudchipr
tests:
  - it: renders nothing when no config field is set
    asserts:
      - hasDocuments:
          count: 0

  - it: renders nothing even when only existingSecret is set (chart-managed secret stays absent)
    set:
      config.existingSecret: my-shared-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: renders an Opaque Secret when at least one config field is set
    set:
      config.c8r_api_key: my-api-key
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: type
          value: Opaque
      - equal:
          path: metadata.name
          value: my-release-c8r-agent
      - equal:
          path: metadata.namespace
          value: cloudchipr

  - it: includes only fields that are non-empty (api key only)
    set:
      config.c8r_api_key: my-api-key
    asserts:
      - equal:
          path: data.C8R_API_KEY
          value: bXktYXBpLWtleQ==
      - notExists:
          path: data.C8R_CLUSTER_ID
      - notExists:
          path: data.C8R_CLOUD_ACCOUNT
      - notExists:
          path: data.C8R_CLUSTER_NAME

  - it: base64-encodes all fields when all are set
    set:
      config.c8r_api_key: my-api-key
      config.c8r_cluster_id: 11111111-2222-3333-4444-555555555555
      config.c8r_cloud_account: aws-account-1
      config.c8r_cluster_name: prod-cluster
    asserts:
      - equal:
          path: data.C8R_API_KEY
          value: bXktYXBpLWtleQ==
      - equal:
          path: data.C8R_CLUSTER_ID
          value: MTExMTExMTEtMjIyMi0zMzMzLTQ0NDQtNTU1NTU1NTU1NTU1
      - equal:
          path: data.C8R_CLOUD_ACCOUNT
          value: YXdzLWFjY291bnQtMQ==
      - equal:
          path: data.C8R_CLUSTER_NAME
          value: cHJvZC1jbHVzdGVy

  - it: renders C8R_CLOUD_ACCOUNT as a numeric string when given a number (no scientific notation)
    set:
      config.c8r_cloud_account: 123456789012
    asserts:
      # base64("123456789012") = MTIzNDU2Nzg5MDEy
      - equal:
          path: data.C8R_CLOUD_ACCOUNT
          value: MTIzNDU2Nzg5MDEy

  - it: merges custom labels with common labels
    set:
      config.c8r_api_key: a-key
      labels:
        custom-label: custom-value
    asserts:
      - equal:
          path: metadata.labels.custom-label
          value: custom-value
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: c8r-agent
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
