suite: Naming and namespace helpers
templates:
  - templates/deployment.yaml
  - templates/daemonset.yaml
  - templates/serviceaccount.yaml
  - templates/secret.yaml
release:
  name: my-release
  namespace: cloudchipr
tests:
  - it: fullname short-circuits when release name contains chart name (no double-prefix)
    release:
      name: c8r-agent-prod
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: metadata.name
          value: c8r-agent-prod

  - it: fullnameOverride wins over release name and chart name
    set:
      fullnameOverride: my-custom-fullname
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: metadata.name
          value: my-custom-fullname

  - it: nameOverride changes app.kubernetes.io/name and the fullname suffix
    set:
      nameOverride: my-app
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: metadata.name
          value: my-release-my-app
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: my-app
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: my-app

  - it: namespaceOverride wins over release namespace everywhere it is referenced
    set:
      namespaceOverride: shared-ns
      networkCollection.enabled: true
      config.c8r_api_key: a-key
    asserts:
      - template: templates/deployment.yaml
        equal:
          path: metadata.namespace
          value: shared-ns
      - template: templates/daemonset.yaml
        equal:
          path: metadata.namespace
          value: shared-ns
      - template: templates/serviceaccount.yaml
        equal:
          path: metadata.namespace
          value: shared-ns
      - template: templates/secret.yaml
        equal:
          path: metadata.namespace
          value: shared-ns

  - it: collector selector labels suffix the chart name with -collector
    set:
      networkCollection.enabled: true
    template: templates/daemonset.yaml
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: c8r-agent-collector
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/name"]
          value: c8r-agent-collector
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: my-release

  - it: createSecret returns false (no Secret) when no config fields are set
    template: templates/secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: createSecret returns true when only c8r_cluster_id is set
    set:
      config.c8r_cluster_id: 11111111-2222-3333-4444-555555555555
    template: templates/secret.yaml
    asserts:
      - hasDocuments:
          count: 1

  - it: createSecret returns true when only c8r_cluster_name is set
    set:
      config.c8r_cluster_name: prod
    template: templates/secret.yaml
    asserts:
      - hasDocuments:
          count: 1

  - it: createSecret returns true when only c8r_cloud_account is set
    set:
      config.c8r_cloud_account: aws-account-1
    template: templates/secret.yaml
    asserts:
      - hasDocuments:
          count: 1

  - it: existingSecret alone does not trigger createSecret
    set:
      config.existingSecret: my-shared-secret
    template: templates/secret.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: common labels include chart, name, instance, version and managed-by
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: metadata.labels["helm.sh/chart"]
          value: c8r-agent-4.0.0
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: c8r-agent
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: my-release
      - equal:
          path: metadata.labels["app.kubernetes.io/version"]
          value: v3.3.0
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
